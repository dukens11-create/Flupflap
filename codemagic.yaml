workflows:
  nextjs_ci:
    name: Next.js CI
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Lint
        script: npm run lint --if-present
      - name: Run tests
        script: npm test --if-present
      - name: Build
        script: npm run build
    artifacts:
      - .next/**/*
      - coverage/**/*
