plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
assert localPropertiesFile.exists(), "local.properties file not found at ${localPropertiesFile.absolutePath}. Run 'flutter pub get' to generate it."
localPropertiesFile.withReader('UTF-8') { reader ->
    localProperties.load(reader)
}
def flutterRoot = localProperties.getProperty('flutter.sdk')
assert flutterRoot != null, "flutter.sdk not set in local.properties"

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Load release signing properties from key.properties if present.
// Do NOT commit key.properties or the keystore file to version control.
def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
def releaseSigningReady = keyPropertiesFile.exists()
if (releaseSigningReady) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
} else {
    logger.warn(
        "WARNING: android/key.properties not found. " +
        "Release builds will NOT be signed for Play Store. " +
        "See mobile/ANDROID_SIGNING.md for setup instructions."
    )
}

android {
    namespace "com.flupflap.app"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.flupflap.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            if (releaseSigningReady) {
                keyAlias keyProperties['keyAlias']
                keyPassword keyProperties['keyPassword']
                storeFile rootProject.file(keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // Use release signing when key.properties is present; otherwise
            // fall back to debug signing so local builds still compile.
            // Never use this fallback for Play Store submissions.
            signingConfig releaseSigningReady ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
