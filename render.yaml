# Render Blueprint — deploys FlupFlap as a Node Web Service (NOT a Static Site).
#
# IMPORTANT: This app is server-rendered (Next.js with API routes, auth, Stripe,
# and Prisma). It must be deployed as a Web Service. Do NOT deploy it as a Static
# Site and do NOT set a publish directory (e.g. "dist"). The Next.js server output
# is in .next/, which is served via `npm run start` (next start).
#
# To use: In Render click New → Blueprint, connect this repo, and Render will read
# this file and create the service with the correct settings automatically.

services:
  - type: web           # Web Service — runs a Node server, not a static CDN
    name: flupflap
    runtime: node
    buildCommand: "npm install && npm run build && if [ -n \"$DATABASE_URL\" ]; then npx prisma db push --skip-generate; fi"  # installs deps, builds, then applies Prisma schema if DATABASE_URL is set
    startCommand: npm run start                  # runs: next start (Node HTTP server on $PORT)
    # NOTE: there is no publishDir / publish directory. This is intentional.
    # Setting publishDir to "dist" or any other path will cause deployment to fail
    # because Next.js does not produce a static dist folder.
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: SHIPPO_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        sync: false
      - key: PLATFORM_FEE_PERCENT
        value: "7"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_PRODUCTS_FOLDER
        value: "flupflap/products"
      - key: CLOUDINARY_VIDEOS_FOLDER
        value: "flupflap/videos"
      - key: CLOUDINARY_USERS_FOLDER
        value: "flupflap/users"
      - key: CLOUDINARY_THUMBNAILS_FOLDER
        value: "flupflap/thumbnails"
    healthCheckPath: /
